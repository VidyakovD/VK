name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: vk_saas
          POSTGRES_PASSWORD: vk_saas_dev_password
          POSTGRES_DB: vk_saas_test
        options: >-
          --health-cmd "pg_isready -U vk_saas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app
        continue-on-error: true  # tighten once code stabilizes

      - name: Tests (pytest)
        working-directory: backend
        env:
          ENV: test
          JWT_SECRET: ci-test-jwt-secret-must-be-long-enough-for-pydantic
          TOKEN_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DATABASE_URL: postgresql+asyncpg://vk_saas:vk_saas_dev_password@localhost:5432/vk_saas_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          QDRANT_URL: http://localhost:6333
        run: pytest -ra

  miniapp:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: miniapp/package-lock.json

      - name: Install
        working-directory: miniapp
        run: npm install --no-audit --no-fund

      - name: Lint
        working-directory: miniapp
        run: npm run lint
        continue-on-error: true  # tighten once code stabilizes

      - name: Typecheck
        working-directory: miniapp
        run: npm run typecheck

      - name: Build
        working-directory: miniapp
        run: npm run build
